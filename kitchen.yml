---
driver:
  name: vagrant

transport:
  name: ssh

provisioner:
  name: chef_zero
  chef_license: accept

verifier:
  name: inspec

platforms:
  - name: ubuntu-20.04

suites:
  - name: wazuh-manager
    run_list:
      - recipe[wazuh_manager::default]
    driver:
      hostname: wazuh-manager
      customize:
        memory: 1024
        cpus: 1

  - name: wazuh-agent
    run_list:
      - recipe[wazuh_agent::default]
    driver:
      hostname: wazuh-agent
      customize:
        memory: 512
        cpus: 1
    attributes:
      ossec:
        address: wazuh-manager
    verifier:
      inspec_tests:
        - name: manager and agent connection test
          path: cookbooks/wazuh_agent/test/integration/wazuh_agent/manager_agent_test.rb
      inputs:
        manager_ip: wazuh-manager
        manager_port: 1514
        protocol: tcp
